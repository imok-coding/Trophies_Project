<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Trophy Project Pages</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="./">
      <span class="mark"><img src="./assets/trophy-project-logo.webp" alt="" /></span>
      <span>Trophy Project</span>
    </a>
    <span class="pill">GitHub Pages Mirror</span>
  </header>

  <main class="shell">
    <section class="hero">
      <div>
        <div class="eyebrow">Static Library</div>
        <h1>All games, searchable from GitHub Pages.</h1>
        <p>This mirror uses a generated static database, so it can work when the main hosting site is blocked.</p>
      </div>
      <div class="stats">
        <div>
          <span>Games</span>
          <strong id="total-games">Loading</strong>
        </div>
        <div>
          <span>Updated</span>
          <strong id="updated-at">Loading</strong>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <label class="search">
          <span aria-hidden="true">Search</span>
          <input id="search" autocomplete="off" placeholder="Search by game title or NPWR" />
        </label>
        <div id="page-label" class="muted">Page 1</div>
      </div>

      <div id="games" class="list">
        <div class="empty">Loading static database...</div>
      </div>

      <div id="pagination" class="pagination"></div>
    </section>
  </main>

  <dialog id="detail-dialog">
    <article class="detail">
      <button id="close-detail" class="close" type="button" aria-label="Close">x</button>
      <div id="detail-content"></div>
    </article>
  </dialog>

  <script src="./app.js" type="module"></script>
</body>
</html>
