name: Build GitHub Pages mirror

on:
  workflow_dispatch:
  schedule:
    - cron: "20 */6 * * *"
  push:
    branches: [main]
    paths:
      - "github-pages/**"
      - "scripts/build-github-pages.mjs"
      - "site/api/pages-export.php"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build static mirror
        env:
          TROPHY_SITE_BASE: https://trophyproject.pro
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: node scripts/build-github-pages.mjs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
